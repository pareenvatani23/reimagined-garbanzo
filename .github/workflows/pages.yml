name: Deploy prototype to Pages

# Publishes the calm-fintech LedgerLink prototype (prototype/index.html) to GitHub Pages
# so the clickable client app + firm console can be viewed in any browser.
on:
  push:
    branches: [ "claude/accountant-app-research-gw906t", "main" ]
    paths: [ "prototype/**", ".github/workflows/pages.yml" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      # enablement: true auto-enables Pages (GitHub Actions source) on first run,
      # so no manual Settings > Pages step is needed.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: prototype
      - id: deployment
        uses: actions/deploy-pages@v4
